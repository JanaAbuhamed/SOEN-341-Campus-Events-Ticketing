<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    /* Reset defaults */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

/* Landing Page */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #7b2ff7, #f107a3);
}

.landing-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.landing-box {
  background: #fff;
  padding: 100px 150px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.landing-box h2 {
  color: #333;
  margin-bottom: 30px;
  font-size: 24px;
}

.landing-buttons {
  display: flex;
  flex-direction: row; 
  gap: 15px; 
  justify-content: center; 
}

.landing-buttons button {
  padding: 15px;
  border: none;
  border-radius: 25px;
  background: #fff;
  color: #a372ab;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.landing-buttons button:hover {
    color: white;
    background: #515151;
}

.signup-link {
  margin-top: 20px;
  color: #fff;
  text-decoration: none;
  font-size: 16px;
}

.signup-link:hover {
  text-decoration: underline;
}

/* Login page */
body.login-page {
  background: linear-gradient(135deg, #7b2ff7, #f107a3);
}

.login-container {
  display: flex;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  overflow: hidden;
  width: 800px;
  max-width: 90%;
  margin: 50px auto;
}

.login-left {
  flex: 1;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-left img {
  width: 150px;
  height: 150px;
  transition: transform 0.1s ease;
  cursor: pointer;
}

.login-right {
  flex: 1;
  padding: 50px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.login-right h2 {
  margin-bottom: 30px;
  font-size: 24px;
  font-weight: bold;
  color: #333;
}

.login-right input {
  width: 100%;
  padding: 15px;
  margin-bottom: 20px;
  border: none;
  border-radius: 25px;
  background: #eee;
  font-size: 14px;
}

.login-right input:focus {
  outline: none;
  background: #ddd;
}

.login-right button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 25px;
  background: #d4acdb;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.login-right button:hover {
  background: #977191;
}

.login-right .links {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
}

.login-right .links a {
  text-decoration: none;
  color: #777;
  margin: 0 5px;
}

.login-right .links a:hover {
  text-decoration: underline;
}

  </style>
</head>
<body>
  <div class="landing-container">
    <div class="landing-box">
      <h2>Welcome to the Campus Events & <br> Ticketing Web Application</h2>
      <div class="landing-buttons">
        <button id="studentBtn">Log in as Student</button>
        <button id="organizerBtn">Log in as Organizer</button>
        <button id="adminBtn">Log in as Admin</button>
      </div>
    </div>
    <a href="{% url 'signup' %}" class="signup-link">Sign Up →</a>
  </div>

  <script>
    // Landing page button redirects
    const studentBtn = document.getElementById('studentBtn');
    const organizerBtn = document.getElementById('organizerBtn');
    const adminBtn = document.getElementById('adminBtn');

    if(studentBtn) {
      studentBtn.addEventListener('click', () => {
        window.location.href = "{% url 'studentlogin' %}";
      });
    }

    if(organizerBtn) {
      organizerBtn.addEventListener('click', () => {
        window.location.href = "{% url 'organizerlogin' %}";
      });
    }

    if(adminBtn) {
      adminBtn.addEventListener('click', () => {
        window.location.href = "{% url 'adminlogin' %}";
      });
    }

    // Login page image follow effect
    const img = document.querySelector('.login-left img');

    if(img) {
      img.addEventListener('mousemove', (e) => {
        const rect = img.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const moveX = (x - rect.width / 2) / 10;
        const moveY = (y - rect.height / 2) / 10;

        img.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });

      img.addEventListener('mouseleave', () => {
        img.style.transform = 'translate(0, 0)';
      });
    }

    // Simple login alert for student/organizer/admin pages
    const loginBtn = document.getElementById('loginBtn');
    if(loginBtn) {
      loginBtn.addEventListener('click', () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(email === "" || password === "") {
          alert("Please enter both email and password.");
        } else {
          
          if(window.location.href.includes('studentlogin')) {
            window.location.href = "{% url 'EventList' %}"; // student events page
          } else if(window.location.href.includes('organizerlogin')) {
            window.location.href = "{% url 'organizerdashboard' %}"; // organizer dashboard
          } else if(window.location.href.includes('adminlogin')) {
            window.location.href = "{% url 'admindashboard' %}"; // admin dashboard
          }
        }
      });
    }
  </script>
</body>
</html>
